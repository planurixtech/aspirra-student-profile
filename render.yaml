databases:
  - name: aspirra-db
    plan: free
    databaseName: aspirra_db
    user: aspirra

services:
  - type: web
    name: aspirra-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__Postgres
        fromDatabase:
          name: aspirra-db
          property: connectionString
      - key: Jwt__SigningKey
        generateValue: true
      - key: Jwt__Issuer
        value: aspirra
      - key: Jwt__Audience
        value: aspirra-users
      - key: Jwt__AccessTokenMinutes
        value: 120
